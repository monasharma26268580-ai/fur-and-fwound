<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><title>Add product</title></head>
<body>
<section th:fragment="content" class="page-shell">
    <h1>Add product</h1>
    <form th:action="@{/admin/products}" method="post" th:object="${product}" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label>SKU<input type="text" th:field="*{sku}" /></label>
        <label>Name<input type="text" th:field="*{name}" required /></label>
        <label>Slug<input type="text" th:field="*{slug}" required /></label>
        <label>Description<textarea th:field="*{description}"></textarea></label>
        <label>Highlights<textarea th:field="*{highlights}"></textarea></label>
        <label>Care info<input type="text" th:field="*{careInfo}" /></label>
        <label>Ideal use<input type="text" th:field="*{idealUse}" /></label>
        <label>SEO description<input type="text" th:field="*{seoDescription}" /></label>
        <label>Price<input type="number" step="0.01" th:field="*{price}" required /></label>
        <label>Stock<input type="number" th:field="*{stockQuantity}" required /></label>
        <label>Category id<input type="number" th:field="*{categoryId}" required /></label>
        <label>Image URL<input type="text" th:field="*{imageUrl}" /></label>
        <button class="btn btn-primary" type="submit">Save product</button>
    </form>
</section>
</body>
</html>
