<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><title>Register</title></head>
<body>
<section th:fragment="content" class="page-shell auth-shell">
    <h1>Create your account</h1>
    <form th:action="@{/register}" method="post" th:object="${user}" class="auth-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <label>Full name<input type="text" th:field="*{fullName}" required /></label>
        <label>Email<input type="email" th:field="*{email}" required /></label>
        <label>Password<input type="password" th:field="*{password}" required /></label>
        <label>Phone<input type="text" th:field="*{phone}" /></label>
        <button type="submit">Register</button>
    </form>
    <p th:if="${error}" th:text="${error}"></p>
</section>
</body>
</html>
