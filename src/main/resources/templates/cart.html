<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><title>Your bag</title></head>
<body>
<section th:fragment="content" class="page-shell">
    <div class="page-heading">
        <p class="eyebrow">Shopping bag</p>
        <h1>Your bag</h1>
        <p>Review quantities before moving to secure checkout.</p>
    </div>
    <div th:if="${#lists.isEmpty(items)}" class="empty-state">
        <p>Your bag is empty. Add a premium pick to continue.</p>
        <a class="btn btn-primary" th:href="@{/shop}">Shop collection</a>
    </div>
    <div th:unless="${#lists.isEmpty(items)}" class="cart-list">
        <div class="cart-item" th:each="item : ${items}">
            <h3 th:text="${item.productName}"></h3>
            <p th:text="'INR ' + ${item.price} + ' each'"></p>
            <form th:action="@{/cart/update}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="productId" th:value="${item.productId}" />
                <input type="number" name="quantity" th:value="${item.quantity}" min="1" />
                <button type="submit">Update</button>
            </form>
            <form th:action="@{/cart/remove/{productId}(productId=${item.productId})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">Remove</button>
            </form>
        </div>
    </div>
    <a class="btn btn-primary" th:href="@{/checkout}" th:if="${!#lists.isEmpty(items)}">Checkout securely</a>
</section>
</body>
</html>
