<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><title>Your wishlist</title></head>
<body>
<section th:fragment="content" class="page-shell">
    <div class="page-heading">
        <p class="eyebrow">Saved favorites</p>
        <h1>Your wishlist</h1>
        <p>Save favorites for later and revisit them whenever you are ready.</p>
    </div>
    <div th:if="${#lists.isEmpty(items)}" class="empty-state">
        <p>No saved products yet.</p>
        <a class="btn btn-primary" th:href="@{/shop}">Browse products</a>
    </div>
    <div th:unless="${#lists.isEmpty(items)}" class="product-grid">
        <div class="product-card" th:each="item : ${items}">
            <img th:src="${item.image_url}" th:alt="${item.name}" />
            <h3 th:text="${item.name}"></h3>
            <p th:text="'INR ' + ${item.price}"></p>
            <a th:href="@{/product/{slug}(slug=${item.slug})}">View</a>
            <form th:action="@{/wishlist/remove/{productId}(productId=${item.id})}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit">Remove</button>
            </form>
        </div>
    </div>
</section>
</body>
</html>
