<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html}">
<head><title>Shop Fur & Found</title></head>
<body>
<section th:fragment="content" class="page-shell">
    <div class="page-heading">
        <p class="eyebrow">Premium pet essentials</p>
        <h1 th:text="${categorySlug != null ? 'Shop ' + categorySlug : 'Shop all essentials'}">Shop all essentials</h1>
        <p>Search, save favorites, and add Fur & Found pieces to your bag.</p>
    </div>
    <form th:action="@{/shop}" method="get" class="search-form page-search">
        <input type="text" name="q" th:value="${query}" placeholder="Search shirts, rainwear, care kits" />
        <button class="btn btn-primary" type="submit">Search</button>
    </form>
    <div class="filter-tabs">
        <a th:href="@{/shop}">All</a>
        <a th:href="@{/category/casual-wear}">Casual Wear</a>
        <a th:href="@{/category/rainwear}">Rainwear</a>
        <a th:href="@{/category/care}">Care</a>
        <a th:href="@{/category/accessories}">Accessories</a>
        <a th:href="@{/category/winter-wear}">Winter Wear</a>
    </div>
    <div th:if="${#lists.isEmpty(products)}" class="empty-state">
        <p>No products found. Try another search or browse all essentials.</p>
    </div>
    <div th:unless="${#lists.isEmpty(products)}" class="product-grid">
        <article class="product-card" th:each="product : ${products}">
            <img th:src="${product.imageUrl}" th:alt="${product.name}" />
            <h3 th:text="${product.name}"></h3>
            <p th:text="${product.seoDescription}"></p>
            <div class="price-row">
                <span th:text="'INR ' + ${product.price}"></span>
                <a th:href="@{/product/{slug}(slug=${product.slug})}">See details</a>
            </div>
            <form th:action="@{/cart/add/{slug}(slug=${product.slug})}" method="post" class="card-cart-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <input type="hidden" name="quantity" value="1" />
                <button class="btn btn-primary" type="submit">Add to cart</button>
            </form>
        </article>
    </div>
</section>
</body>
</html>
